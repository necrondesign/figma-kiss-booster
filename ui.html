<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<!--
  Clawd pixel-art crab animations adapted from "clawd-tank" by Marcio Granzotto Rodrigues (MIT License).
  https://github.com/marciogranzotto/clawd-tank — full notice in THIRD_PARTY_NOTICES.md.
  "Clawd" is the Claude mascot; not affiliated with or endorsed by Anthropic.
-->
<style>
  * { margin:0; padding:0; box-sizing:border-box; }

  :root {
    --bg:#2c2c2c; --btn:#383838; --btn-hover:#444;
    --txt:#fff; --icon:rgba(255,255,255,.85); --label:rgba(255,255,255,.5); --muted:rgba(255,255,255,.4);
    --chk-border:rgba(255,255,255,.7); --chk-bg:#fff; --chk-check:#2c2c2c;
  }
  body.light {
    --bg:#ffffff; --btn:#ebebeb; --btn-hover:#dedede;
    --txt:#1e1e1e; --icon:rgba(0,0,0,.8); --label:rgba(0,0,0,.55); --muted:rgba(0,0,0,.4);
    --chk-border:rgba(0,0,0,.45); --chk-bg:#0c8ce9; --chk-check:#fff;
  }

  body {
    font-family:'Inter', system-ui, -apple-system, sans-serif;
    font-size:11px; color:var(--txt); background:var(--bg); overflow:hidden;
    transition:background .15s;
  }

  #bar { display:flex; align-items:flex-start; gap:4px; padding:6px; width:max-content; }

  .tool-btn {
    width:64px; height:50px; border:none; border-radius:6px; background:var(--btn);
    cursor:pointer; display:flex; flex-direction:column; align-items:flex-start;
    justify-content:space-between; padding:6px 0 6px 8px; flex-shrink:0; position:relative;
    transition:background .12s, transform .08s, height .15s ease-out, padding .15s ease-out;
  }
  .tool-btn:hover { background:var(--btn-hover); }
  .tool-btn:active { transform:scale(.94); }
  .tool-btn.narrow { width:34px; align-items:center; padding:6px 0; }
  .tool-btn.primary { background:#0c8ce9; }
  .tool-btn.primary:hover { background:#0b7fd1; }
  .tool-btn:disabled { opacity:.35; cursor:default; }
  .tool-btn:disabled:hover { background:var(--btn); }
  .tool-btn.primary:disabled:hover { background:#0c8ce9; }

  .btn-icon { display:inline-flex; }
  .btn-icon svg { stroke:var(--icon); }
  .tool-btn.primary .btn-icon svg { stroke:#fff; }
  .btn-label { font-size:10px; color:var(--label); white-space:nowrap; max-width:52px; overflow:hidden; text-overflow:ellipsis; }
  .tool-btn.primary .btn-label { color:#fff; }

  /* Wrap/Fix checkbox (theme toggle) in the button corner */
  .wf-check {
    position:absolute; top:4px; right:4px; width:13px; height:13px; border-radius:3px;
    border:1.5px solid var(--chk-border); background:transparent;
    display:flex; align-items:center; justify-content:center; cursor:pointer; padding:0;
  }
  .wf-check.on { background:var(--chk-bg); border-color:var(--chk-bg); }
  .wf-check svg { width:9px; height:9px; display:none; stroke:var(--chk-check); }
  .wf-check.on svg { display:block; }

  /* Stacked square mini-buttons (Expand ←/→) */
  .tool-group { display:flex; flex-direction:column; gap:4px; width:23px; height:50px; flex-shrink:0; }
  .tool-group .mini {
    flex:1; width:24px; border:none; border-radius:5px; background:var(--btn); cursor:pointer;
    display:flex; align-items:center; justify-content:center; transition:background .12s, transform .08s;
  }
  .tool-group .mini:hover { background:var(--btn-hover); }
  .tool-group .mini:active { transform:scale(.9); }
  .tool-group .mini:disabled { opacity:.35; cursor:default; }
  .tool-group .mini:disabled:hover { background:var(--btn); }
  .tool-group .mini svg { stroke:var(--icon); width:15px; height:15px; }

  .arrow-btn {
    width:22px; height:50px; border:none; border-radius:6px; background:transparent;
    color:var(--muted); cursor:pointer; display:flex; align-items:center;
    justify-content:center; flex-shrink:0; transition:background .12s, height .15s ease-out;
  }
  .arrow-btn:hover { background:var(--btn); color:var(--txt); }
  .arrow-btn svg { transition:transform .2s; }

  /* Collapsed: hide the extra tools; the arrow reveals them to the right */
  body:not(.open) .tool-btn.extra,
  body:not(.open) .tool-group.extra { display:none; }
  body.open .arrow-btn svg { transform:rotate(180deg); }

  /* Status flash on the clicked button */
  .tool-btn.flash-ok, .tool-group .mini.flash-ok { background:#0c8ce9 !important; opacity:1 !important; }
  .tool-btn.flash-err, .tool-group .mini.flash-err { background:#e03e1a !important; opacity:1 !important; }

  /* Flag emoji in the icon slot */
  .flag { font-size:17px; line-height:1; }

  /* Language mode: bar fills the window, close button absorbs free space */
  .tool-btn.grow { align-items:center; justify-content:center; padding:0; } /* same 64×50 as normal buttons, centered icon */

  /* ── Edit (reorder) mode ── */
  .check-btn {
    width:64px; height:50px;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    padding:0;
  }
  .check-btn .btn-icon { display:flex; align-items:center; justify-content:center; }
  .check-btn .btn-label { display:none; }

  body.edit:not(.faq):not(.settings) .tool-btn:not(.check-btn):not(.dragging),
  body.edit:not(.faq):not(.settings) .tool-group:not(.dragging) {
    animation:wiggle .28s ease-in-out infinite; cursor:grab;
  }
  body.edit:not(.faq):not(.settings) .tool-btn:not(.check-btn):hover { background:#383838; }
  body.edit.dragging-active * { cursor:grabbing !important; }

  @keyframes wiggle {
    0%,100% { transform:rotate(-1.2deg); }
    50%     { transform:rotate(1.2deg); }
  }
  body.edit:not(.faq):not(.settings) .tool-btn:not(.check-btn):not(.dragging),
  body.edit:not(.faq):not(.settings) .tool-group:not(.dragging):not(.controls) {
    animation:wiggle .28s ease-in-out infinite; cursor:grab;
  }
  body.edit:not(.faq):not(.settings) .tool-btn:not(.check-btn):hover { background:#383838; }
  body.edit.dragging-active * { cursor:grabbing !important; }

  .dragging {
    animation:none !important; opacity:.92; z-index:20;
    box-shadow:0 6px 16px rgba(0,0,0,.5); cursor:grabbing !important;
  }

  #drop-line {
    position:absolute; top:6px; width:2px; height:50px; border-radius:1px;
    background:#0c8ce9; display:none; pointer-events:none; z-index:15;
  }

  /* ── Settings panel ── */
  body.settings #bar { align-items:center; }
  body.settings .arrow-btn { display:none; }

  /* ── FAQ panel ── */
  #faq { display:none; flex-direction:column; height:100vh; }
  body.faq #bar { display:none; }
  body.faq #faq { display:flex; }
  .faq-head {
    display:flex; align-items:center; justify-content:flex-start; gap:10px;
    padding:12px 14px; border-bottom:1px solid rgba(128,128,128,.22); flex-shrink:0;
  }
  .faq-title { font-size:13px; font-weight:600; color:var(--txt); }
  .faq-back {
    width:24px; height:24px; border:none; border-radius:5px; background:var(--btn);
    color:var(--txt); cursor:pointer; font-size:13px; line-height:1;
    display:flex; align-items:center; justify-content:center; padding:0;
  }
  .faq-back:hover { background:var(--btn-hover); }
  .faq-body { display:flex; flex:1; min-height:0; }
  .faq-list { width:150px; flex-shrink:0; border-right:1px solid rgba(128,128,128,.22); overflow-y:auto; padding:8px; scrollbar-width:none; -ms-overflow-style:none; }
  .faq-item {
    display:flex; align-items:center; gap:8px;
    padding:7px 10px; border-radius:5px; cursor:pointer; color:var(--label);
    font-size:11px; font-weight:500; margin-bottom:2px;
  }
  .faq-item:hover { background:var(--btn); color:var(--txt); }
  .faq-item.active { background:#0c8ce9; color:#fff; }
  .faq-ico { display:inline-flex; flex-shrink:0; }
  .faq-ico svg { width:15px; height:15px; stroke:var(--icon); }
  .faq-item.active .faq-ico svg { stroke:#fff; }
  .faq-desc { flex:1; padding:16px 18px; overflow-y:auto; scrollbar-width:none; -ms-overflow-style:none; }
  .faq-list::-webkit-scrollbar, .faq-desc::-webkit-scrollbar { width:0; height:0; display:none; }
  .faq-desc-title { font-size:14px; font-weight:600; color:var(--txt); margin-bottom:10px; }
  .faq-desc-text { font-size:12px; line-height:1.7; color:var(--label); }

  /* ── Open-position picker ── */
  .tool-btn.pos-btn { padding:0; cursor:default; }
  .tool-btn.pos-btn:hover { background:var(--btn); }
  .pos-pick { position:relative; width:100%; height:100%; }
  .pos-zone {
    position:absolute; width:18px; height:18px; display:flex; align-items:center;
    justify-content:center; cursor:pointer; color:var(--muted);
  }
  .pos-zone:hover { color:var(--txt); }
  .pos-zone.sel { color:#0c8ce9; }
  .pos-zone.tl { top:5px; left:5px; }
  .pos-zone.tr { top:5px; right:5px; }
  .pos-zone.bl { bottom:5px; left:5px; }
  .pos-zone.br { bottom:5px; right:5px; }
  .pos-zone.center { top:50%; left:50%; transform:translate(-50%,-50%); }

  /* ── Delete badge in reorder mode ── */
  .tool-group { position:relative; }
  .del-x {
    position:absolute; top:3px; right:3px; width:15px; height:15px; border-radius:4px;
    background:var(--btn-hover); display:none; align-items:center; justify-content:center;
    cursor:pointer; z-index:30; padding:0; box-shadow:0 1px 3px rgba(0,0,0,.3);
  }
  body.edit .del-x { display:flex; }
  .del-x:hover { background:var(--icon); }
  .del-x:hover svg path { stroke:var(--bg); }
  .del-x svg { width:8px; height:8px; }
  .del-x svg path { stroke:var(--icon); }

  /* ── Create custom button panel ── */
  #create { display:none; flex-direction:column; height:100vh; }
  body.create #bar { display:none; }
  body.create #create { display:flex; }
  .cr-body { flex:1; overflow-y:auto; padding:16px; display:flex; flex-direction:column; gap:16px; scrollbar-width:none; -ms-overflow-style:none; }
  .cr-body::-webkit-scrollbar { width:0; height:0; display:none; }
  .cr-field { display:flex; flex-direction:column; gap:8px; }
  .cr-label { font-size:11px; font-weight:600; color:var(--label); }
  .cr-input {
    width:100%; height:34px; border-radius:6px; border:1px solid rgba(128,128,128,.3);
    background:var(--btn); color:var(--txt); padding:0 10px; font-size:12px; font-family:inherit; outline:none;
  }
  .cr-input:focus { border-color:#0c8ce9; }
  .cr-foot { padding:12px 16px; border-top:1px solid rgba(128,128,128,.22); }
  .cr-create {
    width:100%; height:38px; border:none; border-radius:6px; background:#0c8ce9; color:#fff;
    font-size:12px; font-weight:600; cursor:pointer; font-family:inherit;
  }
  .cr-create:hover { background:#0b7fd1; }
  .cr-create:disabled { opacity:.4; cursor:default; }
  .cr-restore { display:flex; flex-wrap:wrap; gap:6px; }
  .cr-restore-btn {
    display:flex; align-items:center; gap:6px; padding:6px 9px; border-radius:6px;
    border:1px solid rgba(128,128,128,.3); background:var(--btn); color:var(--txt);
    cursor:pointer; font-size:11px; font-weight:500; font-family:inherit;
  }
  .cr-restore-btn:hover { background:var(--btn-hover); }
  .cr-restore-btn.sel { border-color:#0c8ce9; background:rgba(12,140,233,.15); }
  .cr-restore-btn .btn-icon svg { stroke:var(--icon); width:14px; height:14px; }
  .cr-area {
    width:100%; min-height:120px; border-radius:6px; border:1px solid rgba(128,128,128,.3);
    background:var(--btn); color:var(--txt); padding:8px 10px; font-size:11px;
    font-family:ui-monospace, Menlo, Consolas, monospace; outline:none; resize:vertical; line-height:1.5;
  }
  .cr-area:focus { border-color:#0c8ce9; }
  .cr-hint { font-size:10px; color:var(--muted); line-height:1.5; }
  .cr-hint b { color:var(--label); font-weight:600; }
  .cr-hint.err b, .cr-hint.err { color:#e03e1a; }

  /* ── Clawd pet ── */
  .pet-btn { padding:0; align-items:center; justify-content:center; overflow:visible; cursor:pointer; }
  .pet-btn .crab-wrap { width:50px; height:46px; display:flex; align-items:center; justify-content:center; overflow:visible; }
  .pet-btn .crab-wrap svg { width:100%; height:100%; overflow:visible; display:block; }
  .pet-btn .crab-wrap.crab-flip svg { transform:scaleX(-1); }   /* march to the right */
  body.edit .pet-btn { animation:none !important; cursor:default; }
</style>
</head>
<body>
  <div id="bar"></div>
  <div id="drop-line"></div>
  <div id="faq"></div>
  <div id="create"></div>
  <template id="clawd-idle-living">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="-8 -11 31 30" shape-rendering="crispEdges">
  <defs>
    <style>
      /* 16-Second Master Sequence for Idle Actions */
      .action-body {
        transform-origin: 7.5px 13px; /* Pivot at the base of the torso */
        animation: action-body 16s infinite ease-in-out;
      }
      
      /* Continuous Subtle Breathing (Syncs exactly 5 times per 16s loop) */
      .breathe-anim {
        transform-origin: 7.5px 13px;
        animation: breathe 3.2s infinite ease-in-out;
      }

      /* Shadow shrinking and shifting matching actions */
      .shadow-anim {
        transform-origin: 7.5px 15.5px;
        animation: shadow-action 16s infinite ease-in-out;
      }

      /* Left Arm (Scratching and Yawn Stretching) */
      .arm-l {
        transform-origin: 1px 10px;
        animation: arm-l-idle 16s infinite ease-in-out;
      }

      /* Right Arm (Yawn Stretching) */
      .arm-r {
        transform-origin: 14px 10px;
        animation: arm-r-idle 16s infinite ease-in-out;
      }

      /* Eye Tracking (Looking around) */
      .eyes-look {
        animation: eye-track 16s infinite ease-in-out;
      }

      /* Occasional Blinks and shutting during Yawn */
      .eyes-blink {
        transform-origin: 7.5px 9px;
        animation: eye-blink 16s infinite linear;
      }

      /* Yawn Mouth Appearance */
      .yawn-mouth {
        transform-origin: 7.5px 11px;
        animation: yawn-mouth-anim 16s infinite ease-in-out;
        opacity: 0;
      }

      /* Tiny tear that appears during the big yawn */
      .yawn-tear {
        animation: tear-fall 16s infinite ease-in-out;
        opacity: 0;
      }

      /* --- Keyframes --- */

      @keyframes breathe {
        0%, 100% { transform: scale(1, 1) translate(0, 0); }
        50% { transform: scale(1.02, 0.98) translate(0, 0.5px); }
      }

      @keyframes action-body {
        0%, 8%, 26%, 38%, 55%, 80%, 100% { transform: scale(1, 1) translate(0, 0); }
        /* Look Right Tilt */
        12%, 22% { transform: scale(1, 1) translate(1px, 0); }
        /* Look Left Tilt */
        42%, 50% { transform: scale(1, 1) translate(-1px, 0); }
        /* Scratching Lean */
        30%, 36% { transform: scale(1, 1) translate(0.5px, 0); } 
        /* Deep Yawn Stretch */
        60% { transform: scale(0.95, 1.05) translate(0px, -1px); } /* Stretch up */
        65% { transform: scale(0.9, 1.1) translate(0px, -2px); }   /* Peak stretch */
        72% { transform: scale(1.05, 0.95) translate(0px, 1px); }  /* Heavy sigh / squash down */
        76% { transform: scale(1, 1) translate(0px, 0px); }        /* Recover */
      }

      @keyframes shadow-action {
        0%, 8%, 26%, 38%, 55%, 80%, 100% { transform: scaleX(1) translate(0, 0); opacity: 0.5; }
        12%, 22% { transform: scaleX(1) translate(1px, 0); opacity: 0.5; }
        42%, 50% { transform: scaleX(1) translate(-1px, 0); opacity: 0.5; }
        30%, 36% { transform: scaleX(1) translate(0.5px, 0); opacity: 0.5; }
        60% { transform: scaleX(0.95) translate(0, 0); opacity: 0.45; }
        65% { transform: scaleX(0.9) translate(0, 0); opacity: 0.4; }
        72% { transform: scaleX(1.05) translate(0, 0); opacity: 0.55; }
        76% { transform: scaleX(1) translate(0, 0); opacity: 0.5; }
      }

      @keyframes eye-track {
        0%, 10%, 25%, 38%, 52%, 58%, 80%, 100% { transform: translate(0px, 0px); }
        12%, 22% { transform: translate(3px, 0px); } /* Look Right */
        42%, 50% { transform: translate(-3px, 0px); } /* Look Left */
        60%, 75% { transform: translate(0px, -1px); } /* Look slightly up during yawn */
      }

      @keyframes eye-blink {
        0%, 3%, 7%, 18%, 22%, 43%, 47%, 56%, 83%, 87%, 100% { transform: scaleY(1); }
        5%, 20%, 45%, 85% { transform: scaleY(0.1); } /* Quick Blinks */
        /* Yawn Closed Eyes */
        60% { transform: scaleY(1); }
        62%, 72% { transform: scaleY(0.1); } /* Eyes completely shut */
        75% { transform: scaleY(1); }
      }

      @keyframes arm-l-idle {
        0%, 28% { transform: translate(0, 0) rotate(0deg); }
        
        /* Occasional Scratching Sequence (Left Arm) */
        30% { transform: translate(1px, -3px) rotate(15deg); }
        31% { transform: translate(1.5px, -4px) rotate(35deg); } /* Up */
        32% { transform: translate(0.5px, -2.5px) rotate(0deg); } /* Down */
        33% { transform: translate(1.5px, -4px) rotate(35deg); }
        34% { transform: translate(0.5px, -2.5px) rotate(0deg); }
        35% { transform: translate(1.5px, -4px) rotate(35deg); }
        36% { transform: translate(0.5px, -2.5px) rotate(0deg); }
        
        38%, 58% { transform: translate(0, 0) rotate(0deg); }
        
        /* Yawn Stretch */
        62% { transform: translate(-1px, -2px) rotate(45deg); }
        65% { transform: translate(-2px, -3px) rotate(80deg); } /* Full outward stretch */
        72% { transform: translate(0px, 1px) rotate(-15deg); } /* Relax down */
        76%, 100% { transform: translate(0, 0) rotate(0deg); }
      }

      @keyframes arm-r-idle {
        0%, 58% { transform: translate(0, 0) rotate(0deg); }
        /* Yawn Stretch */
        62% { transform: translate(1px, -2px) rotate(-45deg); }
        65% { transform: translate(2px, -3px) rotate(-80deg); } /* Full outward stretch */
        72% { transform: translate(0px, 1px) rotate(15deg); } /* Relax down */
        76%, 100% { transform: translate(0, 0) rotate(0deg); }
      }

      @keyframes yawn-mouth-anim {
        0%, 58%, 76%, 100% { opacity: 0; transform: scale(0.1); }
        60% { opacity: 1; transform: scale(0.5, 0.2); }
        65% { opacity: 1; transform: scale(1.1, 1.4); } /* Wide Open */
        72% { opacity: 1; transform: scale(0.6, 0.4); } /* Shrinking */
        75% { opacity: 0; transform: scale(0.1); }
      }

      @keyframes tear-fall {
        0%, 64%, 80%, 100% { opacity: 0; transform: translateY(0); }
        66% { opacity: 1; transform: translateY(0); } /* Appears at corner of eye */
        72% { opacity: 1; transform: translateY(2.5px); } /* Slides down cheek */
        75% { opacity: 0; transform: translateY(3px); } /* Fades out */
      }
    </style>
  </defs>

  <!-- Ground Shadow -->
  <rect id="ground-shadow" class="shadow-anim" x="3" y="15" width="9" height="1" fill="#000000" opacity="0.5"/>

  <!-- Static Character Legs (Planted firmly while the body stretches above) -->
  <g id="legs" fill="#DE886D">
    <rect id="outer-left-leg" x="3" y="13" width="1" height="2"/>
    <rect id="inner-left-leg" x="5" y="13" width="1" height="2"/>
    <rect id="inner-right-leg" x="9" y="13" width="1" height="2"/>
    <rect id="outer-right-leg" x="11" y="13" width="1" height="2"/>
  </g>

  <!-- Animated Upper Body (Combines occasional actions + continuous breathing) -->
  <g class="action-body">
    <g class="breathe-anim">
      
      <!-- Torso -->
      <rect id="torso" x="2" y="6" width="11" height="7" fill="#DE886D"/>
      
      <!-- Arms -->
      <g class="arm-l">
        <rect id="left-arm" x="0" y="9" width="2" height="2" fill="#DE886D"/>
      </g>
      <g class="arm-r">
        <rect id="right-arm" x="13" y="9" width="2" height="2" fill="#DE886D"/>
      </g>

      <!-- Yawning Mouth (Hidden usually) -->
      <rect class="yawn-mouth" x="6" y="10" width="3" height="2" fill="#000000"/>

      <!-- Eyes Group -->
      <g class="eyes-look" fill="#000000">
        <g class="eyes-blink">
          <rect id="left-eye" x="4" y="8" width="1" height="2"/>
          <rect id="right-eye" x="10" y="8" width="1" height="2"/>
        </g>
      </g>

      <!-- Yawn Tear Drop (A tiny detail for the big stretch) -->
      <rect class="yawn-tear" x="3.5" y="10" width="1" height="1" fill="#40C4FF"/>
      
    </g>
  </g>
</svg>
  </template>
  <template id="clawd-sleeping">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="-8 -11 31 30" shape-rendering="crispEdges">
  <defs>
    <style>
      /* Slow, rhythmic deep breathing animation */
      .breathe {
        transform-origin: 7.5px 15px; /* Pivot at the floor to expand upwards */
        animation: breathe-squash 4.5s infinite ease-in-out;
      }

      /* Shadow expands slightly as the body inflates */
      .shadow-breathe {
        transform-origin: 7.5px 15.5px;
        animation: shadow-pulse 4.5s infinite ease-in-out;
      }

      /* Zzz Particle Base Styles */
      .z-particle {
        opacity: 0;
      }
      .z1 { animation: float-1 6s infinite ease-in-out; animation-delay: 0s; }
      .z2 { animation: float-2 6s infinite ease-in-out; animation-delay: 2s; }
      .z3 { animation: float-3 6s infinite ease-in-out; animation-delay: 4s; }

      /* Breathing Keyframes (Slow inhale, hold, exhale, pause) */
      @keyframes breathe-squash {
        0%, 80%, 100% { transform: scale(1, 1); }
        30%, 40% { transform: scale(1.02, 1.25); } /* Chest expands/inflates */
      }

      @keyframes shadow-pulse {
        0%, 80%, 100% { transform: scaleX(1); opacity: 0.4; }
        30%, 40% { transform: scaleX(1.05); opacity: 0.5; }
      }

      /* Swaying and fading floating Z keyframes (Adjusted for lowered head) */
      @keyframes float-1 {

<svg xmlns="http://www.w3.org/2000/svg" viewBox="-8 -11 31 30" shape-rendering="crispEdges">

        transform-origin: 7.5px 15px;
        animation: jitter 0.08s infinite alternate ease-in-out;
      }

      .arm-l-type {
        transform-origin: 2px 10px; /* Shoulder joint */
        animation: type-l 0.15s infinite ease-in-out;

      .arm-r-type {
        transform-origin: 13px 10px; /* Shoulder joint */
        animation: type-r 0.12s infinite ease-in-out;

        animation: read-code 1.2s infinite;

<svg xmlns="http://www.w3.org/2000/svg" viewBox="-8 -11 31 30" shape-rendering="crispEdges">
  <defs>
    <style>
      /* Main body jump and squash/stretch sequence */
      .body-anim {
        transform-origin: 7.5px 15px; /* Pivot at the base of the feet */
        animation: attention-jump 4s infinite ease-in-out;
      }

      /* Shadow pulsing with jumps */
      .shadow-anim {
        transform-origin: 7.5px 15.5px;
        animation: shadow-pulse 4s infinite ease-in-out;
      }

      /* Eye movement (looking right, then front, blinking) */
      .eyes-look {
        transform-origin: 7.5px 9px;
        animation: eye-track 4s infinite ease-in-out;
      }

      /* Arm flapping/waving */
      .arm-l {
        transform-origin: 1px 10px; /* Left shoulder */
        animation: arm-wave-l 4s infinite ease-in-out;
      }
      .arm-r {
        transform-origin: 14px 10px; /* Right shoulder */
        animation: arm-wave-r 4s infinite ease-in-out;
      }

      /* Notification startle pop */
      .alert-pop {
        transform-origin: 15px 0px;
        animation: alert-flash 4s infinite ease-in-out;
        opacity: 0;
      }

      /* --- Keyframes --- */

      /* 4 Second Loop Sequence */
      @keyframes attention-jump {
        0%, 12% { transform: translate(0px, 0px) scale(1, 1); }
        /* Startle (Look right, recoil slightly) */
        14%, 22% { transform: translate(-1.5px, 0px) scale(1, 1); }
        /* Turn front, squash down to prepare jump */
        26% { transform: translate(0px, 2px) scale(1.1, 0.9); }
        /* Rapid Jumps to get attention */
        30% { transform: translate(0px, -10px) scale(0.95, 1.05); } /* Jump 1 */
        34% { transform: translate(0px, 2px) scale(1.1, 0.9); }     /* Land 1 */
        38% { transform: translate(0px, -10px) scale(0.95, 1.05); } /* Jump 2 */
        42% { transform: translate(0px, 2px) scale(1.1, 0.9); }     /* Land 2 */
        46% { transform: translate(0px, -10px) scale(0.95, 1.05); } /* Jump 3 */
        50% { transform: translate(0px, 2px) scale(1.1, 0.9); }     /* Land 3 */
        54% { transform: translate(0px, -10px) scale(0.95, 1.05); } /* Jump 4 */
        58% { transform: translate(0px, 2px) scale(1.1, 0.9); }     /* Land 4 */
        62% { transform: translate(0px, -10px) scale(0.95, 1.05); } /* Jump 5 */
        66% { transform: translate(0px, 2px) scale(1.1, 0.9); }     /* Land 5 */
        70% { transform: translate(0px, -10px) scale(0.95, 1.05); } /* Jump 6 */
        74% { transform: translate(0px, 2px) scale(1.1, 0.9); }     /* Land 6 */
        /* Recover */
        80%, 100% { transform: translate(0px, 0px) scale(1, 1); }
      }

      @keyframes shadow-pulse {
        0%, 12%, 80%, 100% { transform: scale(1); opacity: 0.5; }
        14%, 22% { transform: translate(-1.5px, 0px) scale(1); opacity: 0.5; }
        26%, 34%, 42%, 50%, 58%, 66%, 74% { transform: scale(1.15); opacity: 0.6; } /* Landing wide */
        30%, 38%, 46%, 54%, 62%, 70% { transform: scale(0.6); opacity: 0.15; } /* Jumping high */
      }

      @keyframes eye-track {
        0%, 12% { transform: translate(0px, 0px); }
        14%, 22% { transform: translate(4px, 0px); } /* Sharp look right */
        26%, 100% { transform: translate(0px, 0px); } /* Look at camera */
      }

      @keyframes arm-wave-l {
        0%, 12% { transform: rotate(0deg); }
        14%, 22% { transform: rotate(-15deg); } /* Slight recoil tuck */
        26% { transform: rotate(30deg); } /* Wind up */
        30%, 38%, 46%, 54%, 62%, 70% { transform: rotate(155deg); } /* Arms up and out! */
        34%, 42%, 50%, 58%, 66%, 74% { transform: rotate(115deg); } /* Flap inwards */
        80%, 100% { transform: rotate(0deg); }
      }

      @keyframes arm-wave-r {
        0%, 12% { transform: rotate(0deg); }
        14%, 22% { transform: rotate(-25deg); } /* Slight recoil tuck */
        26% { transform: rotate(-30deg); } /* Wind up */
        30%, 38%, 46%, 54%, 62%, 70% { transform: rotate(-155deg); } /* Arms up and out! */
        34%, 42%, 50%, 58%, 66%, 74% { transform: rotate(-115deg); } /* Flap inwards */
        80%, 100% { transform: rotate(0deg); }
      }

      @keyframes alert-flash {
        0%, 12% { opacity: 0; transform: translate(15px, 0px) scale(0.5); }
        14% { opacity: 1; transform: translate(15px, -4px) scale(1.2); }
        22% { opacity: 1; transform: translate(15px, -4px) scale(1); }
        26%, 100% { opacity: 0; transform: translate(15px, -8px) scale(0.8); }
      }
    </style>
  </defs>

  <!-- Ground Shadow -->

  <!-- Startled Exclamation Mark (Notification arriving off-screen right) -->

<script>
  // ── Icons (outline, inherit stroke) ──
  const S = (d) => `<svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="#fff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">${d}</svg>`;
  const IC = {
    frame:    S('<path d="M2 6V3h3"/><path d="M12 3h4v3"/><path d="M16 12v3h-4"/><path d="M6 15H2v-3"/>'),

    swap:     S('<path d="M4 6h10"/><path d="M11 3l3 3-3 3"/><path d="M14 12H4"/><path d="M7 9l-3 3 3 3"/>'),

    search:   S('<circle cx="7.5" cy="7.5" r="5"/><path d="M11.5 11.5L16 16"/>'),

    translate:S('<circle cx="9" cy="9" r="7"/><line x1="2" y1="9" x2="16" y2="9"/><ellipse cx="9" cy="9" rx="2.5" ry="7"/>'),
    code:     S('<path d="M6 4L2 9l4 5"/><path d="M12 4l4 5-4 5"/>'),

    greed:    S('<rect x="2.5" y="2.5" width="5" height="5" rx="1"/><rect x="10.5" y="2.5" width="5" height="5" rx="1"/><rect x="2.5" y="10.5" width="5" height="5" rx="1"/><rect x="10.5" y="10.5" width="5" height="5" rx="1"/>'),
    gear:     '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 11-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 11-2.83-2.83l.06-.06a1.65 1.65 0 00.33-1.82 1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 112.83-2.83l.06.06a1.65 1.65 0 001.82.33H9a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 112.83 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>',
    sun:      S('<circle cx="9" cy="9" r="3.2"/><path d="M9 1.8v2M9 14.2v2M1.8 9h2M14.2 9h2M4 4l1.4 1.4M12.6 12.6l1.4 1.4M4 14l1.4-1.4M12.6 5.4l1.4-1.4"/>'),
    moon:     S('<path d="M14.5 10.8A6 6 0 117.2 3.5a4.8 4.8 0 007.3 7.3z"/>'),
    help:     S('<circle cx="9" cy="9" r="7"/><path d="M7 7a2 2 0 113 1.7c-.6.4-1 .8-1 1.6"/><line x1="9" y1="13" x2="9" y2="13.2"/>'),
    check:    S('<path d="M3 9l4 4 8-8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>'),
    sliders:  S('<path d="M4 9h6M4 9v4M4 13h12M16 13v-4M10 5h6M10 5v8M10 13h6M16 13v-4M16 9h2M16 9v4"/><line x1="6" y1="9" x2="6" y2="9.01"/><line x1="6" y1="13" x2="6" y2="13.01"/><line x1="12" y1="5" x2="12" y2="5.01"/><line x1="12" y1="13" x2="12" y2="13.01"/><line x1="18" y1="9" x2="18" y2="9.01"/>'),
    plus:     S('<path d="M9 3v12M3 9h12"/>'),
    component:S('<path d="M9 2.2l6.8 6.8L9 15.8 2.2 9z"/><circle cx="9" cy="9" r="1.7"/>'),
    star:     S('<path d="M9 2l2 4.6 5 .5-3.8 3.4 1.1 4.9L9 12.8 4.7 15.4l1.1-4.9L2 7.1l5-.5z"/>'),
    scale:    S('<path d="M3 7V3h4"/><path d="M3 3l5 5"/><path d="M15 11v4h-4"/><path d="M15 15l-5-5"/>'),
    crab:     S('<ellipse cx="9" cy="9.5" rx="4.5" ry="3.5"/><path d="M4.5 8L2 6M13.5 8l2.5-2M6 12.5l-1 2.5M12 12.5l1 2.5"/>'),
  };

  // ── Enable rules vs selection ──
  const RULES = {
    wrap:    s => s.hasFrames && !s.hasSection && !s.allDark && s.count > 0,
    wrapfix: s => s.hasSection || (s.hasFrames && !s.allDark && s.count > 0),
    section: s => s.hasSection,
    one:     s => s.count === 1,
    any:     s => s.hasAny,
    two:     s => s.count >= 2,
    text:    s => (s.textCount || 0) > 0,
    always:  s => true,
  };

  // ── Tools (left → right) ──
  const TOOLS = [
    { id:'wrap', wrapfix: true, icon: IC.frame, label: 'Wrap', rule: 'wrapfix', primary: true },
    { id:'align', icon: IC.align,    label: 'Align',    cmd: 'align-sections', rule: 'always' },
    { id:'540',     icon: IC.width,    label: '540px',    cmd: 'frame-540',      rule: 'any' },
    { id:'expand', group: [
      { icon: IC.chevronL, cmd: 'expand-section-left', rule: 'one', title: 'Copy left' },
      { icon: IC.chevronR, cmd: 'expand-section',      rule: 'one', title: 'Copy right' },
    ]},
    { id:'find',    icon: IC.search,   label: 'Find',     cmd: 'find-similar',   rule: 'one',  extra: true },
    { id:'replace', icon: IC.swap,     label: 'Replace',  cmd: 'replace-instance', rule: 'two', extra: true },
    { id:'1px',     icon: IC.scissors, label: '1px',      cmd: 'frame-border',   rule: 'any',  extra: true },
    { id:'x267',    icon: IC.scale,    label: '2.67x',    cmd: 'slice-267',      rule: 'any',  extra: true },
    { id:'art',     icon: IC.image,    label: 'Art',      cmd: 'create-art-block', rule: 'any', extra: true },
    { id:'translate', icon: IC.translate, label: 'Translate', cmd: '__translate', rule: 'text', extra: true },
    { id:'dev',     icon: IC.code,     label: 'Dev',      cmd: 'toggle-dev-status', rule: 'always', extra: true },
    { id:'zero',    icon: IC.target,   label: 'Zero',     cmd: 'move-to-zero',   rule: 'one',  extra: true },
    { id:'component', icon: IC.component, label: 'Comp',   cmd: 'make-component', rule: 'any',  extra: true },
    { id:'custom',  icon: IC.star,     label: 'Custom',   cmd: 'custom-absolute', rule: 'any', extra: true },
    { id:'greed',   icon: IC.greed,    label: 'Grid',     cmd: 'grid-layout',    rule: 'any' },
    { id:'settings', settingsBtn: true },
  ];

  let selInfo = { count:0, hasSection:false, hasFrames:false, allDark:false, hasAny:false, textCount:0 };

  function post(type, extra) { parent.postMessage({ pluginMessage: Object.assign({ type }, extra || {}) }, '*'); }

  // ── Custom buttons / removed / order state ──
  const DEFAULT_HIDDEN = ['component', 'custom', 'greed']; // hidden by default → live in Functions add-list
  let customTools = [];   // [{ id, name, icon (IC key), fn }]
  let removedIds = DEFAULT_HIDDEN.slice(); // ids of hidden built-in tools (seeded with defaults)
  let savedOrder = null;  // persisted order of tool ids (settings excluded)

  // Built-in tools + custom tools, ordered, with settings always last
  function composeTools() {
    const settingsDef = TOOLS.find(t => t.settingsBtn);
    const customDefs = customTools.map(c => ({
      id: c.id, icon: IC[c.icon] || IC.frame, label: c.name,
      cmd: '__custom', fn: c.fn, script: c.script, custom: true, rule: 'any', extra: true
    }));
    let list = TOOLS.filter(t => !t.settingsBtn).concat(customDefs);
    if (savedOrder && savedOrder.length) {
      const byId = {}; list.forEach(t => byId[t.id] = t);
      const next = []; const seen = new Set();
      for (const id of savedOrder) { if (byId[id] && !seen.has(id)) { next.push(byId[id]); seen.add(id); } }
      for (const t of list) { if (!seen.has(t.id)) next.push(t); }
      list = next;
    }
    list.unshift({ id: 'claude', pet: true }); // Claude pet — always first, not reorderable
    if (settingsDef) list.push(settingsDef);
    return list;
  }

  // Small red ✕ badge shown on each button in reorder mode
  function addDeleteX(el, id) {
    if (!editMode) return;
    const x = document.createElement('span');
    x.className = 'del-x';
    x.title = 'Delete button';
    x.innerHTML = '<svg viewBox="0 0 8 8" fill="none"><path d="M1 1l6 6M7 1l-6 6" stroke="#fff" stroke-width="1.6" stroke-linecap="round"/></svg>';
    x.addEventListener('pointerdown', (e) => e.stopPropagation());
    x.onclick = (e) => { e.stopPropagation(); deleteTool(id); };
    el.appendChild(x);
  }

  function deleteTool(id) {
    if (customTools.some(c => c.id === id)) {
      customTools = customTools.filter(c => c.id !== id);
      post('save-custom', { custom: customTools });
    } else {
      if (!removedIds.includes(id)) removedIds.push(id);
      post('save-removed', { removed: removedIds });
    }
    buildToolbar(); applyEnable(); fitSize();
  }

  // ── Clawd pet — first block. Idle anims rotate randomly; tool clicks / expand / collapse / settings / pet-tap trigger reactions. Deletable, not draggable. ──
  const CLAWD_IDLE = ['clawd-idle-living', 'clawd-sleeping', 'clawd-wake'];                              // rotate when untouched
  const CLAWD_REACT = ['clawd-working-typing', 'clawd-working-building', 'clawd-working-builder', 'clawd-working-wizard']; // any tool click
  const CLAWD_PET = ['clawd-eureka', 'clawd-notification', 'clawd-dizzy'];                                // tapping the crab itself
  const CLAWD_EXPAND = 'clawd-crab-walking';       // arrow → reveal (crab walks out)
  const CLAWD_COLLAPSE = 'clawd-going-away';       // arrow → hide (crab burrows away)
  const CLAWD_SETTINGS = 'clawd-working-overheated'; // shown on return from Settings (panel hides the crab while open)

  let petIdleTimer = null, petRevertTimer = null, petAfterSettings = false;
  function clawdWrap() { return document.querySelector('.pet-btn .crab-wrap'); }
  function clawdShow(tplId) {
    const wrap = clawdWrap(), tpl = document.getElementById(tplId);
    if (!wrap || !tpl || !tpl.content) return;
    wrap.innerHTML = '';
    wrap.appendChild(tpl.content.cloneNode(true));
    wrap.classList.toggle('crab-flip', tplId === 'clawd-crab-walking'); // mirror walking → marches right
  }
  function clawdRand(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
  function petIdleLoop() {
    if (!clawdWrap()) { petIdleTimer = null; return; }
    clawdShow(clawdRand(CLAWD_IDLE));
    petIdleTimer = setTimeout(petIdleLoop, 9000 + Math.random() * 5000);
  }
  function petStartIdle() {
    if (petRevertTimer) { clearTimeout(petRevertTimer); petRevertTimer = null; }
    if (petIdleTimer) { clearTimeout(petIdleTimer); petIdleTimer = null; }
    if (!clawdWrap()) return;
    petIdleLoop();
  }
  function petTempThen(tplId, ms) {
    if (!clawdWrap()) return;
    if (petIdleTimer) { clearTimeout(petIdleTimer); petIdleTimer = null; }
    if (petRevertTimer) clearTimeout(petRevertTimer);
    clawdShow(tplId);
    petRevertTimer = setTimeout(() => { petRevertTimer = null; petStartIdle(); }, ms);
  }
  function petMount() {
    petStartIdle();
    if (petAfterSettings) { petAfterSettings = false; petTempThen(CLAWD_SETTINGS, 2800); } // returned from Settings
  }
  function petPlay() { petTempThen(clawdRand(CLAWD_PET), 2800); }                     // tapping the crab → random
  function petReact() { if (clawdWrap()) petTempThen(clawdRand(CLAWD_REACT), 2800); } // tool click → random reaction
  function petGesture(open) { if (clawdWrap()) petTempThen(open ? CLAWD_EXPAND : CLAWD_COLLAPSE, open ? 1000 : 3000); } // expand: 2 marches × 0.5s

  function fitSize() {
    const bar = document.getElementById('bar');
    const r = bar.getBoundingClientRect();
    if (r.width < 2) return; // toolbar hidden (a panel is open) — don't post a bogus size
    post('resize', { width: Math.ceil(r.width) + 1, height: Math.ceil(r.height) });
  }

  // Flash the last-clicked button to show success / error
  let lastBtn = null;
  function flash(status) {
    const b = lastBtn;
    if (!b || !b.isConnected) return;
    const cls = status === 'error' ? 'flash-err' : 'flash-ok';
    b.classList.add(cls);
    setTimeout(() => b.classList.remove(cls), 1100);
  }

  let wfTheme = true; // checkbox: with dark theme

  function onWrapFix() {
    petReact();
    if (selInfo.hasSection) post(wfTheme ? 'fix-selection' : 'fix-selection-light');
    else post(wfTheme ? 'wrap-selection' : 'wrap-selection-light');
  }

  function buildToolbar() {
    const bar = document.getElementById('bar');
    bar.innerHTML = '';
    document.body.classList.remove('lang');
    document.body.classList.remove('settings');
    document.body.classList.remove('create');
    let shown = 0;
    for (const t of composeTools()) {
      // Hidden (deleted) built-in tools are skipped; restored on reset
      if (!t.settingsBtn && removedIds.includes(t.id)) continue;
      // Collapsed view shows only the first 3 reorderable tools; settings/faq/pos hidden
      let isExtra;
      if (t.settingsBtn || t.faqBtn || t.posBtn) isExtra = true;
      else if (shown < 3) { isExtra = false; shown++; }
      else isExtra = true;

      if (t.settingsBtn) {
        if (editMode) {
          // In edit mode: show checkmark button
          const cb = document.createElement('button');
          cb.className = 'tool-btn check-btn' + (isExtra ? ' extra' : '');
          cb.title = 'Save and exit reorder mode';
          cb.innerHTML = `<span class="btn-icon">${IC.check}</span>`;
          cb.onclick = () => toggleEdit(null);
          bar.appendChild(cb);
        } else {
          // Normal mode: show settings button
          const sb = document.createElement('button');
          sb.className = 'tool-btn' + (isExtra ? ' extra' : '');
          sb.dataset.id = 'settings-btn';
          sb.title = 'Settings';
          sb.innerHTML = `<span class="btn-icon">${IC.gear}</span><span class="btn-label">Settings</span>`;
          sb.onclick = () => { petAfterSettings = true; openSettings(); }; // Clawd shows "overheated" on return
          bar.appendChild(sb);
        }
        continue;
      }

      if (t.pet) {
        const b = document.createElement('button');
        b.className = 'tool-btn pet-btn' + (isExtra ? ' extra' : '');
        b.dataset.id = t.id;
        b.title = 'Clawd';
        const wrap = document.createElement('span');
        wrap.className = 'crab-wrap';
        b.appendChild(wrap);
        b.onclick = () => { if (editMode) return; petPlay(); };
        addDeleteX(b, t.id);   // deletable like a normal button…
        bar.appendChild(b);    // …but no makeDraggable → can't be moved
        petMount();
        continue;
      }



      if (t.wrapfix) {
        const b = document.createElement('button');
        b.className = 'tool-btn' + (isExtra ? ' extra' : '');
        b.dataset.rule = t.rule;
        b.title = 'Section → Fix, objects → Wrap (check = with dark theme)';
        b.innerHTML = `<span class="btn-icon">${t.icon}</span><span class="btn-label">${t.label}</span>`;
        if (!editMode) {
          const chk = document.createElement('span');
          chk.className = 'wf-check' + (wfTheme ? ' on' : '');
          chk.title = 'With dark theme';
          chk.innerHTML = '<svg viewBox="0 0 10 10" fill="none"><path d="M1.8 5l2 2 4.4-5" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>';
          chk.onclick = (e) => { e.stopPropagation(); wfTheme = !wfTheme; chk.classList.toggle('on', wfTheme); post('save-wf', { on: wfTheme }); };
          b.appendChild(chk);
        }
        b.onclick = () => { if (editMode || b.disabled) return; lastBtn = b; onWrapFix(); };
        b.dataset.id = t.id;
        makeDraggable(b);
        addDeleteX(b, t.id);
        bar.appendChild(b);
        continue;
      }
      if (t.group) {
        const g = document.createElement('div');
        g.className = 'tool-group' + (isExtra ? ' extra' : '');
        g.dataset.id = t.id;
        for (const m of t.group) {
          const mb = document.createElement('button');
          mb.className = 'mini';
          mb.dataset.cmd = m.cmd;
          mb.dataset.rule = m.rule;
          if (m.title) mb.title = m.title;
          mb.innerHTML = `<span class="btn-icon">${m.icon}</span>`;
          mb.onclick = () => onTool(m, mb);
          g.appendChild(mb);
        }
        makeDraggable(g);
        addDeleteX(g, t.id);
        bar.appendChild(g);
        continue;
      }
      const isGear = t.cmd === '__settings';
      const isTheme = t.cmd === '__theme';
      const b = document.createElement('button');
      b.className = 'tool-btn' + (t.narrow ? ' narrow' : '') + (t.primary ? ' primary' : '') + (isExtra ? ' extra' : '') + (isGear ? ' gear-btn' : '');
      b.dataset.cmd = t.cmd;
      b.dataset.rule = t.rule;
      b.dataset.id = t.id;
      if (t.label) b.title = t.label;
      const iconHtml = isTheme ? (lightTheme ? IC.moon : IC.sun) : t.icon;
      b.innerHTML = `<span class="btn-icon">${iconHtml}</span>` + (t.label ? `<span class="btn-label">${t.label}</span>` : '');
      if (isGear) {
        if (editMode) b.classList.add('active');
        b.onclick = () => toggleEdit(b);
      } else if (isTheme) {
        b.onclick = () => { if (!editMode) toggleTheme(); };
        makeDraggable(b);
      } else {
        b.onclick = (e) => onTool(t, b);
        makeDraggable(b);
      }
      addDeleteX(b, t.id);
      bar.appendChild(b);
    }
    const arrow = document.createElement('button');
    arrow.className = 'arrow-btn';
    arrow.title = 'Show / hide more';
    arrow.innerHTML = '<svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M6 4l4 4-4 4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>';
    arrow.onclick = () => { document.body.classList.toggle('open'); const open = document.body.classList.contains('open'); fitSize(); petGesture(open); };
    bar.appendChild(arrow);
  }

  // ── Create custom button ──
  const SCRIPT_HINT = 'ops: <b>move</b>{dx,dy} · <b>pos</b>{x,y} · <b>resize</b>{w,h} · <b>opacity</b>{value} · <b>rotate</b>{deg} · <b>corner</b>{value} · <b>fill</b>{color,opacity} · <b>stroke</b>{color,weight} · <b>visible</b>{value} · <b>lock</b>{value} · <b>rename</b>{name} · <b>text</b>{value}. Name tokens: {w} {h} {i} {name}.';

  function openCreate() {
    document.body.classList.remove('settings');
    document.body.classList.add('create');
    let nbName = '', pickedRemoved = null, pickedCode = false;

    const c = document.getElementById('create');
    c.innerHTML =
      `<div class="faq-head"><button class="faq-back" id="cr-back"><span class="btn-icon">${IC.chevronL}</span></button><span class="faq-title">Functions</span></div>` +
      `<div class="cr-body">` +
        `<div class="cr-field" id="cr-restore-field" style="display:none"><div class="cr-label">Add back removed</div><div class="cr-restore" id="cr-restore"></div></div>` +
        `<div class="cr-field"><div class="cr-label">New</div><div class="cr-restore"><button class="cr-restore-btn" id="cr-code-opt"><span class="btn-icon">${IC.code}</span><span>Code (JSON)</span></button></div></div>` +
        `<div class="cr-field" id="cr-name-field" style="display:none"><div class="cr-label">Name</div><input id="cr-name" class="cr-input" type="text" placeholder="My button" maxlength="16"></div>` +
        `<div class="cr-field" id="cr-script-field" style="display:none"><div class="cr-label">Script (JSON)</div>` +
          `<textarea id="cr-script" class="cr-area" spellcheck="false" placeholder='{ "ops": [\n  {"op":"resize","w":1080,"h":1080},\n  {"op":"fill","color":"#1E1E1E"},\n  {"op":"rename","name":"Cover {i}"}\n] }'></textarea>` +
          `<div class="cr-hint" id="cr-hint"></div></div>` +
      `</div>` +
      `<div class="cr-foot"><button class="cr-create" id="cr-create" disabled>Add function</button></div>`;

    const createBtn = c.querySelector('#cr-create');
    const scriptArea = c.querySelector('#cr-script');
    const hint = c.querySelector('#cr-hint');
    const codeOpt = c.querySelector('#cr-code-opt');
    const nameField = c.querySelector('#cr-name-field');
    const scriptField = c.querySelector('#cr-script-field');

    function parseScript() {
      const v = (scriptArea.value || '').trim();
      if (!v) return null;
      try { const o = JSON.parse(v); return (o && Array.isArray(o.ops) && o.ops.length) ? o : null; }
      catch (_e) { return null; }
    }
    function showCodeFields(on) { nameField.style.display = on ? 'flex' : 'none'; scriptField.style.display = on ? 'flex' : 'none'; }
    function sizePanel() {
      // Size the window to the panel's content → consistent 16px bottom padding (no empty gap)
      const head = c.querySelector('.faq-head').offsetHeight;
      const foot = c.querySelector('.cr-foot').offsetHeight;
      const body = c.querySelector('.cr-body');
      let inner = 32; // cr-body vertical padding (16 + 16)
      [...body.children].filter(k => k.style.display !== 'none').forEach((k, i) => { inner += k.offsetHeight + (i ? 16 : 0); });
      post('resize', { width: 560, height: Math.min(head + foot + inner, 500) });
    }
    function validate() { createBtn.disabled = !(pickedRemoved || (pickedCode && nbName && parseScript())); }

    // ── Removed buttons: re-add from here ──
    const restoreField = c.querySelector('#cr-restore-field');
    const restoreBox = c.querySelector('#cr-restore');
    function removedDisplay(id) {
      if (id === 'claude') return { icon: IC.crab, label: 'Clawd' };
      const t = TOOLS.find(x => x.id === id);
      if (!t) return null;
      if (t.icon) return { icon: t.icon, label: t.label || id };
      if (t.group) return { icon: t.group[0].icon, label: 'Copy ←/→' };
      return null;
    }
    function renderRestore() {
      restoreBox.innerHTML = '';
      const ids = removedIds.slice();
      if (!ids.length) { restoreField.style.display = 'none'; return; }
      restoreField.style.display = 'flex';
      for (const id of ids) {
        const disp = removedDisplay(id);
        if (!disp) continue;
        const b = document.createElement('button');
        b.className = 'cr-restore-btn' + (pickedRemoved === id ? ' sel' : '');
        b.dataset.rid = id;
        b.innerHTML = `<span class="btn-icon">${disp.icon}</span><span>${disp.label}</span>`;
        b.onclick = () => {
          pickedCode = false; codeOpt.classList.remove('sel'); showCodeFields(false);
          pickedRemoved = pickedRemoved === id ? null : id;
          [...restoreBox.children].forEach(x => x.classList.toggle('sel', x.dataset.rid === pickedRemoved));
          sizePanel(); validate();
        };
        restoreBox.appendChild(b);
      }
    }
    renderRestore();

    hint.innerHTML = SCRIPT_HINT;

    // Code (JSON) button → reveal the name + script fields
    codeOpt.onclick = () => {
      pickedCode = !pickedCode;
      codeOpt.classList.toggle('sel', pickedCode);
      if (pickedCode) { pickedRemoved = null; [...restoreBox.children].forEach(x => x.classList.remove('sel')); }
      showCodeFields(pickedCode);
      sizePanel(); validate();
    };

    scriptArea.oninput = () => {
      const v = scriptArea.value.trim();
      if (!v) { hint.className = 'cr-hint'; hint.innerHTML = SCRIPT_HINT; }
      else {
        try {
          const o = JSON.parse(v);
          if (o && Array.isArray(o.ops)) { hint.className = 'cr-hint'; hint.textContent = `Valid · ${o.ops.length} op(s) ✓`; }
          else { hint.className = 'cr-hint err'; hint.textContent = 'Need { "ops": [ ... ] }'; }
        } catch (e) { hint.className = 'cr-hint err'; hint.textContent = 'JSON error: ' + e.message; }
      }
      validate();
    };

    const nameInput = c.querySelector('#cr-name');
    nameInput.oninput = () => { nbName = nameInput.value.trim(); validate(); };
    c.querySelector('#cr-back').onclick = () => closeCreate(true);
    createBtn.onclick = () => {
      if (createBtn.disabled) return;
      if (pickedRemoved) {
        removedIds = removedIds.filter(x => x !== pickedRemoved);
        post('save-removed', { removed: removedIds });
        closeCreate();
        return;
      }
      const o = parseScript();
      if (!o) return;
      customTools.push({ id: 'custom-' + Date.now(), name: nbName, icon: 'code', fn: '__script', script: o });
      post('save-custom', { custom: customTools });
      closeCreate();
    };

    validate();
    sizePanel();
  }

  function closeCreate(toSettings) {
    document.body.classList.remove('create');
    if (toSettings) { openSettings(); return; } // back → settings menu
    buildToolbar();
    applyEnable();
    fitSize();
  }

  // ── Reorder (edit) mode ──
  let editMode = false;
  let drag = null;

  function toggleEdit(gearBtn) {
    editMode = !editMode;
    document.body.classList.toggle('edit', editMode);
    if (gearBtn) gearBtn.classList.toggle('active', editMode);
    if (!editMode) {
      saveOrder();
      closeSettings();
    } else {
      document.body.classList.add('open'); // reveal all tools so every one can be reordered / deleted
      buildToolbar();
      applyEnable();
      fitSize();
    }
  }

  function reorderables() {
    return [...document.getElementById('bar').children]
      .filter(el => !el.classList.contains('arrow-btn') && !el.classList.contains('controls') && !el.classList.contains('faq-btn') && !el.classList.contains('pos-btn') && !el.classList.contains('pet-btn'));
  }

  function makeDraggable(el) {
    el.addEventListener('pointerdown', (e) => {
      if (!editMode) return;
      e.preventDefault();
      drag = { el, startX: e.clientX };
      try { el.setPointerCapture(e.pointerId); } catch (_e) {}
      el.classList.add('dragging');
      document.body.classList.add('dragging-active');
    });
  }

  function targetBefore(x) {
    const items = reorderables().filter(el => el !== (drag && drag.el));
    for (const el of items) {
      const r = el.getBoundingClientRect();
      if (x < r.left + r.width / 2) return el;
    }
    return document.querySelector('#bar .controls') || document.querySelector('#bar .arrow-btn');
  }

  function showDropLine(beforeEl) {
    const line = document.getElementById('drop-line');
    let left;
    if (beforeEl) left = beforeEl.getBoundingClientRect().left - 3;
    else {
      const items = reorderables();
      const last = items[items.length - 1];
      left = last ? last.getBoundingClientRect().right + 1 : 6;
    }
    line.style.left = Math.max(2, left) + 'px';
    line.style.display = 'block';
  }

  document.addEventListener('pointermove', (e) => {
    if (!drag) return;
    drag.el.style.transform = `translateX(${e.clientX - drag.startX}px)`;
    showDropLine(targetBefore(e.clientX));
  });

  document.addEventListener('pointerup', (e) => {
    if (!drag) return;
    const bar = document.getElementById('bar');
    const before = targetBefore(e.clientX);
    drag.el.style.transform = '';
    drag.el.classList.remove('dragging');
    document.body.classList.remove('dragging-active');
    document.getElementById('drop-line').style.display = 'none';
    if (before && before !== drag.el) bar.insertBefore(drag.el, before);
    drag = null;
    reindexTools();
    buildToolbar();   // rebuild so the "first 3 visible when collapsed" recomputes
    applyEnable();
    saveOrder();
    fitSize();
  });

  function reindexTools() {
    savedOrder = [...document.getElementById('bar').children]
      .filter(el => !el.classList.contains('arrow-btn'))
      .map(el => el.dataset.id)
      .filter(id => id && id !== 'settings-btn' && id !== 'claude');
  }

  function applySavedOrder(order) {
    savedOrder = (order && order.length) ? order.slice() : null;
  }

  function saveOrder() {
    if (!savedOrder) reindexTools();
    console.log("saveOrder:", savedOrder);
    post('save-order', { order: savedOrder });
  }

  // ── Languages (flag emoji) ──
  const LANGUAGES = [
    { code:'ru', name:'Russian',  flag:'🇷🇺' }, { code:'en', name:'English', flag:'🇬🇧' },
    { code:'de', name:'German',   flag:'🇩🇪' }, { code:'pl', name:'Polish',  flag:'🇵🇱' },
    { code:'ar', name:'Arabic',   flag:'🇸🇦' }, { code:'zh', name:'Chinese', flag:'🇨🇳' },
    { code:'fr', name:'French',  flag:'🇫🇷' },
    { code:'ja', name:'Japanese', flag:'🇯🇵' },
    { code:'ko', name:'Korean',   flag:'🇰🇷' },
  ];
  let targetLang = 'ru';

  // Replace the whole toolbar with language flag buttons
  function renderLangs() {
    const bar = document.getElementById('bar');
    bar.innerHTML = '';
    document.body.classList.add('lang'); // language picker — bar hugs its buttons
    for (const l of LANGUAGES) {
      const b = document.createElement('button');
      b.className = 'tool-btn';
      b.title = l.name;
      b.innerHTML = `<span class="btn-icon"><span class="flag">${l.flag}</span></span><span class="btn-label">${l.name}</span>`;
      b.onclick = () => { targetLang = l.code; runTranslate(); buildToolbar(); applyEnable(); fitSize(); };
      bar.appendChild(b);
    }
    const back = document.createElement('button');
    back.className = 'tool-btn grow';
    back.title = 'Cancel';
    back.innerHTML = '<span class="btn-icon"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="rgba(255,255,255,.85)" stroke-width="1.5" stroke-linecap="round"><path d="M4 4l8 8M12 4l-8 8"/></svg></span>';
    back.onclick = () => { buildToolbar(); applyEnable(); fitSize(); };
    bar.appendChild(back);
    fitSize();
  }

  function runTranslate() {
    post('notify', { text: 'Translating…' });
    post('run-translation', { target: targetLang });
  }

  async function translateViaGoogle(payload, target) {
    try {
      const results = [];
      for (const item of payload) {
        const res = await fetch('https://translate.googleapis.com/translate_a/single?client=gtx&sl=auto&tl=' + target + '&dt=t&q=' + encodeURIComponent(item.text));
        const data = await res.json();
        results.push({ id: item.id, translatedText: data[0].map(p => p[0]).join('') });
      }
      post('apply-data', { results });
    } catch (e) {
      console.error('Translation error:', e);
      post('notify', { text: 'Translation error', error: true });
    }
  }

  // ── Messages from plugin ──
  window.onmessage = (e) => {
    const msg = e.data.pluginMessage;
    if (!msg) return;

    if (msg.type === 'selection-info') {
      selInfo = msg;
      applyEnable();
    }
    if (msg.type === 'status') {
      flash(msg.status);
    }
    if (msg.type === 'start-api-call') {
      translateViaGoogle(msg.payload, msg.target);
    }
    if (msg.type === 'order') {
      applySavedOrder(msg.order);
      buildToolbar();
      applyEnable();
      fitSize();
    }
    if (msg.type === 'custom') {
      customTools = msg.custom || [];
      buildToolbar();
      applyEnable();
      fitSize();
    }
    if (msg.type === 'removed') {
      removedIds = msg.removed || DEFAULT_HIDDEN.slice();
      buildToolbar();
      applyEnable();
      fitSize();
    }
    if (msg.type === 'theme') {
      lightTheme = !!msg.light;
      document.body.classList.toggle('light', lightTheme);
      buildToolbar();
      applyEnable();
      fitSize();
    }
    if (msg.type === 'pos') {
      uiPos = msg.pos || 'center';
      buildToolbar();
      applyEnable();
      fitSize();
    }
    if (msg.type === 'wf') {
      wfTheme = msg.on !== false;
      buildToolbar();
      applyEnable();
      fitSize();
    }
  };

  buildToolbar();
  applyEnable();
  requestAnimationFrame(fitSize);
  post('get-order');
  post('get-theme');
  post('get-custom');
  post('get-removed');
  post('get-wf');
</script>
</body>
</html>
