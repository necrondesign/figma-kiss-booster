<!DOCTYPE html>
<html>
<head>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    font-size: 11px;
    color: #fff;
    background: #2c2c2c;
    width: 320px;
    overflow-x: hidden;
  }

  /* Tabs */
  .tabs {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 16px;
    border-bottom: 1px solid #444;
  }
  .tab {
    height: 24px;
    padding: 0 8px;
    border-radius: 5px;
    border: none;
    font-family: inherit;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.055px;
    cursor: pointer;
    line-height: 24px;
    background: #2c2c2c;
    color: rgba(255,255,255,0.4);
  }
  .tab:hover {
    background: #383838;
  }
  .tab.active {
    background: #383838;
    color: #fff;
  }
  .tab.active:hover {
    color: #fff;
  }

  /* Sections */
  .section {
    padding: 0 16px 16px;
    border-bottom: 1px solid #444;
  }
  .section:last-child {
    border-bottom: none;
  }
  .section-label {
    font-weight: 600;
    font-size: 11px;
    letter-spacing: 0.11px;
    padding: 16px 0;
    line-height: 16px;
  }
  .section-content {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  /* Status */
  .status {
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 5px;
    padding: 0 8px;
    height: 24px;
    line-height: 24px;
    font-weight: 500;
    font-size: 11px;
    letter-spacing: 0.055px;
    color: #fff;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .status.empty {
    color: rgba(255,255,255,0.4);
  }
  .status.error {
    background: #472f2a;
    border-color: transparent;
    color: #e03e1a;
  }
  .status.success {
    border-color: rgba(255,255,255,0.1);
    color: #0c8ce9;
  }

  /* Buttons */
  .btn {
    height: 32px;
    border-radius: 5px;
    border: none;
    font-family: inherit;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.055px;
    cursor: pointer;
    line-height: 16px;
    padding: 0 12px;
    text-align: center;
    width: 100%;
    transition: opacity 0.15s;
  }
  .btn:hover { opacity: 0.85; }
  .btn:active { opacity: 0.7; }
  .btn:disabled { cursor: default; opacity: 1; }
  .btn-primary {
    background: #0c8ce9;
    color: #fff;
  }
  .btn-secondary {
    background: #383838;
    color: rgba(255,255,255,0.4);
  }
  .btn-processing {
    background: #383838;
    color: rgba(255,255,255,0.4);
    cursor: default;
  }
  .btn-processing:hover { opacity: 1; }
  .btn-done {
    background: #394360;
    color: #7cc4f8;
    cursor: default;
  }
  .btn-done:hover { opacity: 1; }
  .btn-error {
    background: #e03e1a;
    color: #fff;
    cursor: default;
  }
  .btn-error:hover { opacity: 1; }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }
  .loader {
    display: inline-block;
    width: 12px;
    height: 12px;
    border: 2px solid rgba(255,255,255,0.2);
    border-top-color: rgba(255,255,255,0.4);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-right: 4px;
    vertical-align: middle;
  }
  .btn-row {
    display: flex;
    gap: 8px;
  }
  .btn-row .btn {
    flex: 1;
  }
  .other-buttons {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  /* Note */
  .note {
    font-weight: 600;
    font-size: 11px;
    letter-spacing: 0.11px;
    padding: 16px 0;
    line-height: 16px;
    color: #fff;
  }

  /* Select dropdown */
  .select-wrapper {
    display: flex;
    gap: 1px;
    align-items: center;
    width: 100%;
    height: 24px;
    cursor: pointer;
    position: relative;
  }
  .select-left {
    flex: 1;
    min-width: 0;
    background: #383838;
    border-radius: 5px 0 0 5px;
    padding: 0 8px;
    height: 24px;
    line-height: 24px;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.055px;
    color: #fff;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .select-right {
    width: 24px;
    height: 24px;
    background: #383838;
    border-radius: 0 5px 5px 0;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .select-right svg { width: 16px; height: 16px; }
  .dropdown-menu {
    position: absolute;
    top: -8px;
    left: 0;
    width: 157px;
    background: #1e1e1e;
    border-radius: 13px;
    padding: 8px;
    box-shadow: 0px 2px 5px rgba(0,0,0,0.35), 0px 10px 16px rgba(0,0,0,0.35),
                inset 0px 0px 0.5px rgba(255,255,255,0.35), inset 0px 0.5px 0px rgba(255,255,255,0.08);
    z-index: 100;
  }
  .dropdown-item {
    display: flex;
    align-items: center;
    padding: 4px 12px;
    width: 141px;
    height: 24px;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.055px;
    color: #fff;
    border-radius: 5px;
    cursor: pointer;
    transition: background 0.1s;
  }
  .dropdown-item:hover { background: #0c8ce9; }
  .dropdown-item .check {
    width: 16px;
    height: 16px;
    margin-right: 4px;
    flex-shrink: 0;
  }

  /* Translator footer */
  .translator-footer {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 16px 16px 0;
  }
  .footer-note {
    font-size: 8px;
    font-weight: 500;
    text-transform: uppercase;
    color: rgba(255,255,255,0.1);
    letter-spacing: 0.055px;
    text-align: center;
    padding: 8px 0;
    line-height: 16px;
  }

  /* Tab content */
  .tab-content { display: none; }
  .tab-content.active { display: block; }
</style>
</head>
<body>

  <div class="tabs">
    <button class="tab active" data-tab="tools">Tools</button>
    <button class="tab" data-tab="art">Task & status</button>
    <button class="tab" data-tab="translator">Translator</button>
  </div>

  <!-- Tools Tab -->
  <div class="tab-content active" id="tab-tools">
    <div class="section">
      <div class="section-label">Create new selection and make dark theme</div>
      <div class="section-content">
        <div class="status empty" id="status-wrap">Select elements</div>
        <button class="btn btn-secondary" id="btn-wrap" onclick="send('wrap-selection')">Wrap to new selection</button>
      </div>
    </div>

    <div class="section">
      <div class="section-label">Fix & expand selection</div>
      <div class="section-content">
        <div class="status empty" id="status-fix">Select elements</div>
        <div class="btn-row">
          <button class="btn btn-secondary" id="btn-fix" onclick="send('fix-selection')">Fix selection</button>
          <button class="btn btn-secondary" id="btn-expand" onclick="sendInstant('expand-section')">Expand selection</button>
        </div>
      </div>
    </div>

    <div class="section">
      <div class="section-label">Other</div>
      <div class="other-buttons">
        <div class="btn-row">
          <button class="btn btn-primary" id="btn-align" onclick="send('align-sections')">Align sections</button>
          <button class="btn btn-primary" id="btn-copy" onclick="sendInstant('smart-copy')">Smart copy</button>
        </div>
        <div class="btn-row">
          <button class="btn btn-primary" id="btn-frame" onclick="send('frame-border')">Make 1px gap</button>
          <button class="btn btn-primary" id="btn-dev" onclick="sendInstant('toggle-dev-status')">Ready for dev</button>
        </div>
      </div>
    </div>

  </div>

  <!-- Task & Status Tab -->
  <div class="tab-content" id="tab-art">
    <div class="section">
      <div class="section-label">Art task</div>
      <div class="section-content">
        <div class="status empty" id="status-art">Select elements</div>
        <button class="btn btn-secondary" id="btn-art" onclick="send('create-art-block')">Create art task</button>
      </div>
    </div>

    <div class="section" style="border-bottom:none;">
      <div class="section-label">Status</div>
      <div class="section-content">
        <input type="text" id="sticker-name" placeholder="Status text" style="
          background: transparent;
          border: 1px solid rgba(255,255,255,0.1);
          border-radius: 5px;
          height: 24px;
          padding: 0 8px;
          font-family: inherit;
          font-size: 11px;
          font-weight: 500;
          letter-spacing: 0.055px;
          color: #fff;
          width: 100%;
          outline: none;
        " onfocus="this.style.borderColor='#0c8ce9'" onblur="this.style.borderColor='rgba(255,255,255,0.1)'" />
        <button class="btn btn-secondary" id="btn-sticker" onclick="sendSticker()">Create status</button>
      </div>
    </div>
  </div>

  <!-- Translator Tab -->
  <div class="tab-content" id="tab-translator">
    <div class="section">
      <div class="section-label">Translation to</div>
      <div style="position:relative;">
        <div class="select-wrapper" id="lang-select" onclick="toggleLangMenu()">
          <div class="select-left" id="lang-label">Russian</div>
          <div class="select-right"><svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path fill-rule="evenodd" clip-rule="evenodd" d="M5.647 7.147a.5.5 0 01.706 0L8 8.794l1.647-1.647a.5.5 0 01.706.706l-2 2a.5.5 0 01-.706 0l-2-2a.5.5 0 010-.706z" fill="white"/></svg></div>
        </div>
        <div class="dropdown-menu" id="lang-menu" style="display:none"></div>
      </div>
    </div>

    <div class="section">
      <div class="section-label">Selection</div>
      <div class="status empty" id="status-translate">Select elements</div>
    </div>

    <div class="translator-footer">
      <button class="btn btn-secondary" id="btn-translate" onclick="runTranslate()" style="width:100%;">Translate selection</button>
      <div class="footer-note">work on google translate engine</div>
    </div>
  </div>

<script>
  // Tab switching
  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
      tab.classList.add('active');
      document.getElementById('tab-' + tab.dataset.tab).classList.add('active');
    });
  });

  let lastClickedBtn = null;

  function send(action) {
    const btn = event.currentTarget;
    if (!btn.dataset.text) btn.dataset.text = btn.textContent;
    lastClickedBtn = btn;
    btn.className = 'btn btn-processing';
    btn.disabled = true;
    btn.innerHTML = '<span class="loader"></span>Processing';
    parent.postMessage({ pluginMessage: { type: action } }, '*');
  }

  function sendInstant(action) {
    parent.postMessage({ pluginMessage: { type: action } }, '*');
  }

  function updateStatus(id, text, type) {
    const el = document.getElementById(id);
    if (!el) return;
    el.textContent = text;
    el.className = 'status' + (type ? ' ' + type : '');
  }

  function setBtn(id, active) {
    const btn = document.getElementById(id);
    if (!btn) return;
    // Don't override while button is in processing/done/error state
    if (lastClickedBtn === btn) return;
    btn.className = 'btn ' + (active ? 'btn-primary' : 'btn-secondary');
    btn.disabled = !active;
  }

  window.onmessage = (e) => {
    const msg = e.data.pluginMessage;
    if (!msg) return;

    if (msg.type === 'status') {
      // Find which status field belongs to the clicked button
      if (lastClickedBtn) {
        const btnId = lastClickedBtn.id;
        const statusMap = {
          'btn-wrap': 'status-wrap',
          'btn-fix': 'status-fix',
          'btn-expand': 'status-fix',
          'btn-align': null,
          'btn-frame': null,
          'btn-art': 'status-art',
        };
        const statusId = statusMap[btnId];
        if (statusId) {
          updateStatus(statusId, msg.text, msg.status);
        }
      }

      // Update clicked button to done/error state
      if (lastClickedBtn) {
        const btn = lastClickedBtn;

        if (msg.status === 'error') {
          btn.className = 'btn btn-error';
          btn.innerHTML = msg.text;
        } else {
          btn.className = 'btn btn-done';
          btn.innerHTML = '&#10003; Done';
        }
        btn.disabled = true;

        // Reset after 2s
        setTimeout(() => {
          btn.innerHTML = btn.dataset.text;
          lastClickedBtn = null;
          // Trigger selection update to restore correct state
          parent.postMessage({ pluginMessage: { type: 'request-selection' } }, '*');
        }, 2000);
      }
    }

    if (msg.type === 'selection-info') {
      const { count, hasSection, hasFrames, allDark, hasAny } = msg;

      const sel = count === 0 ? 'Select elements' : count + ' selected';

      // Wrap: needs frames, no sections, not all dark
      const canWrap = hasFrames && !hasSection && !allDark && count > 0;
      updateStatus('status-wrap', sel, canWrap ? '' : 'empty');
      setBtn('btn-wrap', canWrap);

      // Fix/Expand: needs a section selected
      updateStatus('status-fix', sel, hasSection ? '' : 'empty');
      setBtn('btn-fix', hasSection);
      setBtn('btn-expand', hasSection);

      // Align: always available
      setBtn('btn-align', true);

      // Frame border: needs any selection
      setBtn('btn-frame', hasAny);

      // Sticker: needs any selection
      setBtn('btn-sticker', hasAny);

      // Art calculator: needs any selection
      updateStatus('status-art', sel, hasAny ? '' : 'empty');
      setBtn('btn-art', hasAny);

      // Translator: needs text nodes
      const tc = msg.textCount || 0;
      const hasText = tc > 0;
      updateStatus('status-translate', hasText ? tc + ' text layers' : 'Select elements', hasText ? '' : 'empty');
      setBtn('btn-translate', hasText);
    }

    // Translator: API call from plugin
    if (msg.type === 'start-api-call') {
      translateViaGoogle(msg.payload, msg.target);
    }
    if (msg.type === 'apply-data-success') {
      const btn = document.getElementById('btn-translate');
      if (btn) {
        btn.className = 'btn btn-done';
        btn.innerHTML = '&#10003; Done';
        btn.disabled = true;
        setTimeout(() => {
          btn.innerHTML = btn.dataset.text || 'Translate selection';
          parent.postMessage({ pluginMessage: { type: 'request-selection' } }, '*');
        }, 2000);
      }
    }
    if (msg.type === 'translate-error') {
      const btn = document.getElementById('btn-translate');
      if (btn) {
        btn.className = 'btn btn-error';
        btn.innerHTML = 'Error';
        btn.disabled = true;
        setTimeout(() => {
          btn.innerHTML = btn.dataset.text || 'Translate selection';
          parent.postMessage({ pluginMessage: { type: 'request-selection' } }, '*');
        }, 2000);
      }
    }
  };

  // ── Translator logic ──
  const LANGUAGES = [
    { code: 'ru', name: 'Russian' },
    { code: 'en', name: 'English' },
    { code: 'de', name: 'German' },
    { code: 'pl', name: 'Polish' },
    { code: 'ar', name: 'Arabic' },
    { code: 'zh', name: 'Chinese' },
    { code: 'es', name: 'Spanish' },
    { code: 'fr', name: 'French' },
    { code: 'pt', name: 'Portuguese' },
    { code: 'ja', name: 'Japanese' },
    { code: 'ko', name: 'Korean' },
  ];

  let targetLang = 'ru';

  const checkSvg = '<svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M11.584 3.723a.5.5 0 01.832.554l-5 7.5a.5.5 0 01-.77.077l-3-3a.5.5 0 01.708-.708l2.568 2.569L11.584 3.723z" fill="white"/></svg>';
  const emptySvg = '<div style="width:16px;height:16px;"></div>';

  function buildLangMenu() {
    const menu = document.getElementById('lang-menu');
    menu.innerHTML = LANGUAGES.map(l =>
      '<div class="dropdown-item" onclick="selectLang(\'' + l.code + '\')">' +
        '<span class="check">' + (l.code === targetLang ? checkSvg : emptySvg) + '</span>' +
        l.name +
      '</div>'
    ).join('');
  }
  buildLangMenu();

  function toggleLangMenu() {
    const menu = document.getElementById('lang-menu');
    menu.style.display = menu.style.display === 'none' ? 'block' : 'none';
  }

  function selectLang(code) {
    targetLang = code;
    document.getElementById('lang-label').textContent = LANGUAGES.find(l => l.code === code).name;
    document.getElementById('lang-menu').style.display = 'none';
    buildLangMenu();
  }

  // Close menu on click outside
  document.addEventListener('click', (e) => {
    const menu = document.getElementById('lang-menu');
    const sel = document.getElementById('lang-select');
    if (menu && sel && !sel.contains(e.target) && !menu.contains(e.target)) {
      menu.style.display = 'none';
    }
  });

  function sendSticker() {
    const btn = document.getElementById('btn-sticker');
    if (!btn || btn.disabled) return;
    if (!btn.dataset.text) btn.dataset.text = btn.textContent;
    const nameInput = document.getElementById('sticker-name');
    const name = nameInput ? nameInput.value : '';
    lastClickedBtn = btn;
    btn.className = 'btn btn-processing';
    btn.disabled = true;
    btn.innerHTML = '<span class="loader"></span>Processing';
    parent.postMessage({ pluginMessage: { type: 'create-sticker', name: name } }, '*');
  }

  function runTranslate() {
    const btn = document.getElementById('btn-translate');
    if (!btn || btn.disabled) return;
    if (!btn.dataset.text) btn.dataset.text = btn.textContent;
    btn.className = 'btn btn-processing';
    btn.disabled = true;
    btn.innerHTML = '<span class="loader"></span>Processing';
    parent.postMessage({ pluginMessage: { type: 'run-translation', target: targetLang } }, '*');
  }

  async function translateViaGoogle(payload, target) {
    try {
      const results = [];
      for (const item of payload) {
        const res = await fetch('https://translate.googleapis.com/translate_a/single?client=gtx&sl=auto&tl=' + target + '&dt=t&q=' + encodeURIComponent(item.text));
        const data = await res.json();
        results.push({ id: item.id, translatedText: data[0].map(p => p[0]).join('') });
      }
      parent.postMessage({ pluginMessage: { type: 'apply-data', results } }, '*');
    } catch (e) {
      console.error('Translation error:', e);
      const btn = document.getElementById('btn-translate');
      if (btn) {
        btn.className = 'btn btn-error';
        btn.innerHTML = 'Error';
        btn.disabled = true;
        setTimeout(() => {
          btn.innerHTML = btn.dataset.text || 'Translate selection';
          parent.postMessage({ pluginMessage: { type: 'request-selection' } }, '*');
        }, 2000);
      }
    }
  }
</script>
</body>
</html>
